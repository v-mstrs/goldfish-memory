<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css">
    <title>goldfish memory</title>
</head>

<body>
    <div class="page-shell">
    <div class="main">
        <div id="novelToast" class="toast hidden"></div> <!--popup when new novel is created-->

        <div class="row" style="justify-content: center; position: relative;">
            <img src="/goldfish-white.png" id="rescanPage" width="60px" height="auto">
            <h1>goldfish memory</h1>
            <button id="optionsBtn" title="Open Options">⚙</button>
        </div>

        <div class="row">
            <select id="novelSelect" class="flex-grow">
                <option value="" disabled selected>Select Novel</option>
            </select>
            <button id="toggleNovelDrawer" class="toggle-btn" title="Add New Novel">
                <span id="arrow">▼</span>
            </button>
        </div>

        <div id="novelAddDrawer" class="hidden">
            <div class="row">
                <input type="text" id="newNovel" placeholder="New Novel Name...">
                <button id="saveNovelBtn">Add</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 5px 0;">

        <input type="text" id="charName" placeholder="Main Name (e.g. Artoria)">
        <input type="text" id="charAliases" placeholder="Aliases (Encrid, Enkrid...)">

        <textarea id="charDesc" placeholder="Character Description..."></textarea>
        <input type="text" id="charImgUrl" placeholder="Image URL">
        <div class="color-picker-group">
            <div class="color-picker-label">Highlight Color</div>
            <div id="charHighlightPalette" class="color-palette">
                <button type="button" class="color-swatch no-color" data-color="none" style="--swatch-color: transparent;" title="No color"></button>
                <button type="button" class="color-swatch selected" data-color="#c5daff" style="--swatch-color: #c5daff;" title="Default blue"></button>
                <button type="button" class="color-swatch" data-color="#ff8a80" style="--swatch-color: #ff8a80;" title="Soft red"></button>
                <button type="button" class="color-swatch" data-color="#ffd180" style="--swatch-color: #ffd180;" title="Warm gold"></button>
                <button type="button" class="color-swatch" data-color="#a5d6a7" style="--swatch-color: #a5d6a7;" title="Green"></button>
                <button type="button" class="color-swatch" data-color="#80deea" style="--swatch-color: #80deea;" title="Cyan"></button>
                <button type="button" class="color-swatch" data-color="#b39ddb" style="--swatch-color: #b39ddb;" title="Lavender"></button>
                <button type="button" class="color-swatch" data-color="#f48fb1" style="--swatch-color: #f48fb1;" title="Pink"></button>
            </div>
            <input type="text" id="charHighlightColor" placeholder="#c5daff">
        </div>

        <button id="addCharBtn">Add Character</button>

      </div>

      <aside class="settings-panel">
        <div class="settings-card">
            <div class="settings-kicker">Display Settings</div>
            <h2>Reader Highlight Style</h2>
            <p class="settings-copy">These only affect how highlights render on this device.</p>

            <label class="settings-field">
                <span>Backend URL</span>
                <input id="apiBaseUrlSetting" type="text" placeholder="http://127.0.0.1:8000">
                <small class="settings-help">Change the backend host or port here. Example: `http://192.168.1.20:8000`.</small>
            </label>

            <label class="settings-field">
                <span>Gemini API Key</span>
                <input id="geminiApiKeySetting" type="password" placeholder="AI API Key...">
                <small class="settings-help">Required for AI character extraction. Get one from Google AI Studio.</small>
            </label>

            <label class="settings-field">
                <span>Font Size</span>
                <input id="displayFontSize" type="number" min="10" max="36" step="1" inputmode="numeric" placeholder="16">
                <small class="settings-help">Sets the size of highlighted names while reading.</small>
            </label>

            <label class="settings-field">
                <span>Underline</span>
                <select id="displayUnderlineStyle">
                    <option value="none">No underline</option>
                    <option value="solid">Solid</option>
                    <option value="dashed">Dashed</option>
                    <option value="dotted">Dotted</option>
                    <option value="wavy">Wavy</option>
                </select>
                <small class="settings-help">Choose how character names are underlined while reading.</small>
            </label>

            <label class="settings-field">
                <span>Text Style</span>
                <select id="displayTextStyle">
                    <option value="700-normal">Bold</option>
                    <option value="600-normal">Semibold</option>
                    <option value="400-normal">Normal</option>
                    <option value="400-italic">Italic</option>
                    <option value="600-italic">Semibold Italic</option>
                    <option value="700-italic">Bold Italic</option>
                </select>
                <small class="settings-help">Controls font weight and italic styling for highlighted names.</small>
            </label>

            <label class="settings-field">
                <span>Max Highlights Per Character</span>
                <input id="displayHighlightLimit" type="number" min="1" max="50" step="1" inputmode="numeric" placeholder="5">
                <small class="settings-help">Caps how many times the same character can be highlighted on a page.</small>
            </label>

            <div class="settings-preview">
                <div class="settings-preview-label">Preview</div>
                <div class="settings-preview-copy">
                    The Watch remembered <span id="highlightPreviewWord" class="settings-preview-word">John Snow</span> long after the chapter ended.
                </div>
            </div>

            <div id="displaySettingsStatus" class="settings-status hidden">Saved</div>
        </div>
      </aside>
    </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
